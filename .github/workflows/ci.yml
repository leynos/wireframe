name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_VERSION: '0.2.1'
    steps:
      # Full history is required for the CodeScene `cs-coverage check` gate,
      # which diffs a pull request against its merge base.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
      - name: Format
        run: make check-fmt
      - name: Cache Whitaker installer
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker
        run: |
          if command -v whitaker-installer >/dev/null 2>&1; then
            echo "whitaker-installer already present; skipping cargo binstall"
          else
            cargo binstall --no-confirm whitaker-installer@${{ env.WHITAKER_INSTALLER_VERSION }}
          fi
          whitaker-installer
      - name: Lint
        run: make lint
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: '3.13'
          enable-cache: true
      - name: Install Rust for Merman
        run: rustup toolchain install 1.95.0 --profile minimal --no-self-update
      - name: Install Merman CLI
        run: cargo +1.95.0 install merman-cli --version "=0.7.0" --locked
      - name: Install Nixie
        run: uv tool install --python 3.14 "nixie-cli==1.1.0"
      - name: Enforce en-GB-oxendict spelling
        run: make spelling
      - name: Validate Mermaid diagrams
        run: make nixie
      - name: Workflow contract tests
        run: make test-workflow-contracts
      # Coverage runs on pull requests only and drives the ratchet gate.
      # Main-branch coverage — the CodeScene upload plus the authoritative
      # ratchet baseline every pull request compares against — is produced
      # by coverage-main.yml on push, so generation is kept out of
      # main-push runs to avoid doing the work twice.
      - name: Test and Measure Coverage
        if: github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/generate-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          output-path: lcov.info
          format: lcov
          with-ratchet: 'true'
      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: env.CS_ACCESS_TOKEN != '' && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@4977418856133491c6aa7407d40668744df21818
        with:
          format: lcov
          mode: check
          project-url: https://api.codescene.io/v2/projects/68308
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
